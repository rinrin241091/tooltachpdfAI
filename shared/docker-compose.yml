version: "3.9"

services:
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: pdf_backend
    ports:
      - "8000:8000"
    volumes:
      - ../backend/uploads:/app/uploads
      - ../backend/outputs:/app/outputs
    environment:
      - PYTHONUNBUFFERED=1

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: pdf_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
